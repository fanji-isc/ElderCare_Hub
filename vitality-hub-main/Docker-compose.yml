services:
  app:
    build: .
    container_name: vitality-hub
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "3001:3001"
      - "52773:52773"
      - "1972:1972"
    volumes:
      - iris-data:/data
      - ./backend/iris:/iris-src
      - ./src:/app/src               # frontend — Vite HMR, no rebuild needed
      - ./backend:/app/backend       # backend  — uvicorn --reload, no rebuild needed
    environment:
      ISC_DATA_DIRECTORY: /data/ifconfig
      ISC_CPF_MERGE_FILE: /merge/CMF.cpf
      OPENAI_API_KEY: ${OPENAI_API_KEY}

volumes:
  iris-data:
